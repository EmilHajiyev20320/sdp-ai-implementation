name: Deploy To Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  REPOSITORY: ${{ vars.ARTIFACT_REPO }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},AI_BACKEND=gemini,GEMINI_USE_VERTEX=1"

      - name: Show service URL
        run: gcloud run services describe "${{ env.SERVICE }}" --region "${{ env.REGION }}" --format='value(status.url)'

      - name: Smoke test deployed service
        run: |
          SERVICE_URL="$(gcloud run services describe "${{ env.SERVICE }}" --region "${{ env.REGION }}" --format='value(status.url)')"
          STATUS_URL="${SERVICE_URL}/admin/status"
          echo "Testing $STATUS_URL"
          export RESPONSE="$(curl -fsS "$STATUS_URL")"
          echo "$RESPONSE"

          python - <<'PY'
import json
import os

response = os.environ.get("RESPONSE", "")
data = json.loads(response)

required = ["project", "ai_backend", "gemini_configured"]
missing = [key for key in required if key not in data]
if missing:
    raise SystemExit(f"Smoke test failed: missing keys {missing}")

if data.get("project") != os.environ.get("PROJECT_ID"):
    raise SystemExit(f"Smoke test failed: project mismatch {data.get('project')!r}")

if not data.get("gemini_configured"):
    raise SystemExit("Smoke test failed: Gemini not configured")

print("Smoke test passed")
PY
